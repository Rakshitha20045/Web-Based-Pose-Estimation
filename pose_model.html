<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoga Pose Classification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f3e5f5; /* Soft lavender background */
        }
        .container {
            background: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            width: 400px;
            border: 5px solid #ba68c8; /* Purple border */
        }
        h1 {
            color: #6a1b9a;
            margin-bottom: 20px;
            font-size: 28px;
        }
        #canvas {
            border: 3px solid #ba68c8; /* Matching purple border */
            border-radius: 10px;
            width: 100%;
            max-width: 350px;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }
        button {
            flex: 1;
            background-color: #8e24aa; /* Purple button */
            color: white;
            padding: 12px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #6a1b9a; /* Darker purple on hover */
        }
        #label-container {
            margin-top: 20px;
            font-size: 18px;
            color: #4a148c; /* Dark purple text */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Yoga Pose Classification</h1>
        <canvas id="canvas"></canvas>
        <div class="btn-group">
            <button type="button" onclick="start()">Start</button>
            <button type="button" class="stop-btn" onclick="stop()">Stop</button>
        </div>
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <script type="text/javascript">
        const URL = "http://localhost:8000/my_model/"; // Path to your local model files
        let model, webcam, ctx, labelContainer, maxPredictions;
        let animationFrameId;

        async function start() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // Load the model and metadata
            model = await tmPose.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // Set up the webcam
            const size = 200;
            const flip = true;
            webcam = new tmPose.Webcam(size, size, flip);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop); // Start the loop

            // Canvas setup
            const canvas = document.getElementById("canvas");
            canvas.width = size; canvas.height = size;
            ctx = canvas.getContext("2d");
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        function stop() {
            if (webcam) {
                webcam.stop(); // Stop the webcam
                cancelAnimationFrame(animationFrameId); // Stop the animation loop
                console.log("Pose detection stopped.");
            }
        }

        async function loop(timestamp) {
            webcam.update(); // Update the webcam frame
            await predict();
            animationFrameId = window.requestAnimationFrame(loop); // Keep requesting the next frame
        }

        async function predict() {
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction =
                    prediction[i].className + ": " + prediction[i].probability.toFixed(2);
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }

            drawPose(pose);
        }

        function drawPose(pose) {
            if (webcam.canvas) {
                ctx.drawImage(webcam.canvas, 0, 0);
                if (pose) {
                    const minPartConfidence = 0.5;
                    tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                    tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
                }
            }
        }
    </script>
</body>
</html>
